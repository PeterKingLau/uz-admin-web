<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
        <meta name="renderer" content="webkit" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
        <title>测吧后台管理系统</title>
        <script>
            ;(() => {
                const clientRouteTitle = '测吧'
                const clientRouteClass = 'client-route-shell'
                const exactClientPaths = new Set(['/discover', '/publish', '/profile', '/content/userProfile', '/user/profile'])
                const clientPathPrefixes = ['/profile/', '/content/video-player/', '/content/media-viewer/']
                const normalizePath = value => value.replace(/\/+$/, '') || '/'
                const currentPath = normalizePath(window.location.pathname || '/')
                const isClientPath = exactClientPaths.has(currentPath) || clientPathPrefixes.some(prefix => currentPath.startsWith(prefix))

                if (!isClientPath) return
                document.documentElement.classList.add(clientRouteClass)
                document.title = clientRouteTitle
            })()
        </script>

        <style>
            html,
            body,
            #app {
                height: 100%;
                margin: 0;
                padding: 0;
            }

            html.client-route-shell,
            html.client-route-shell body,
            html.client-route-shell #app {
                background: #ffffff;
            }
        </style>
    </head>

    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
