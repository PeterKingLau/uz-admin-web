<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
        <meta name="renderer" content="webkit" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
        <title>测吧后台管理系统</title>
        <script>
            ;(() => {
                const path = window.location.pathname || ''
                const isClientPath =
                    path === '/discover' ||
                    path === '/publish' ||
                    path === '/profile' ||
                    path.startsWith('/profile/') ||
                    path.startsWith('/content/video-player') ||
                    path.startsWith('/content/userProfile') ||
                    path.startsWith('/user/profile')

                if (isClientPath) {
                    document.documentElement.classList.add('client-route-shell')
                    document.title = '测吧'
                }
            })()
        </script>
        




        <style>
            html,
            body,
            #app {
                height: 100%;
                margin: 0px;
                padding: 0px;
            }

            html.client-route-shell,
            html.client-route-shell body,
            html.client-route-shell #app {
                background: #ffffff;
            }

            .chromeframe {
                margin: 0.2em 0;
                background: #ccc;
                color: #000;
                padding: 0.2em 0;
            }

            @-webkit-keyframes spin {
                0% {
                    -webkit-transform: rotate(0deg);
                    -ms-transform: rotate(0deg);
                    transform: rotate(0deg);
                }

                100% {
                    -webkit-transform: rotate(360deg);
                    -ms-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }

            @keyframes spin {
                0% {
                    -webkit-transform: rotate(0deg);
                    -ms-transform: rotate(0deg);
                    transform: rotate(0deg);
                }

                100% {
                    -webkit-transform: rotate(360deg);
                    -ms-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
